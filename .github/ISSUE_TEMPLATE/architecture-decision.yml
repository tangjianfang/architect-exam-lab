name: 架构决策记录（ADR）
description: 记录重要的架构决策，关联 ATAM 质量属性分析
title: "[ADR] "
labels: ["architecture-decision", "documentation"]
assignees:
  - tangjianfang
body:
  - type: markdown
    attributes:
      value: |
        ## 🏛️ 架构决策记录（Architecture Decision Record）
        本模板用于记录重要的架构决策，参考 Michael Nygard ADR 格式，并结合 ATAM 质量属性分析。

  - type: input
    id: decision-title
    attributes:
      label: 决策标题
      description: 简洁描述这个架构决策
      placeholder: "例：采用 Redis 作为分布式缓存方案"
    validations:
      required: true

  - type: input
    id: decision-date
    attributes:
      label: 决策日期
      placeholder: "YYYY-MM-DD"
    validations:
      required: true

  - type: dropdown
    id: status
    attributes:
      label: 决策状态
      options:
        - 提议中（Proposed）
        - 已接受（Accepted）
        - 已废弃（Deprecated）
        - 已取代（Superseded）
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 背景与问题
      description: 描述需要做决策的背景、驱动力和问题
      placeholder: |
        系统面临的问题：
        - 

        业务/技术约束：
        - 

        质量属性要求：
        - 
    validations:
      required: true

  - type: textarea
    id: options
    attributes:
      label: 可选方案
      description: 列举至少两个可选的架构方案
      value: |
        ### 方案一：
        **描述：**

        **优点：**
        - 

        **缺点：**
        - 

        ---

        ### 方案二：
        **描述：**

        **优点：**
        - 

        **缺点：**
        - 
    validations:
      required: true

  - type: textarea
    id: decision
    attributes:
      label: 决策结果
      description: 选择的方案及理由
      placeholder: |
        **选择方案：**

        **选择理由：**
        1. 
        2. 
    validations:
      required: true

  - type: textarea
    id: quality-attributes
    attributes:
      label: ATAM 质量属性影响分析
      description: 分析决策对各质量属性的影响（+正面/-负面/~中性）
      value: |
        | 质量属性 | 影响 | 说明 |
        |---------|------|------|
        | 性能（Performance） | ~ | |
        | 可用性（Availability） | ~ | |
        | 安全性（Security） | ~ | |
        | 可修改性（Modifiability） | ~ | |
        | 可测试性（Testability） | ~ | |
        | 可部署性（Deployability） | ~ | |
        | 互操作性（Interoperability） | ~ | |
    validations:
      required: true

  - type: dropdown
    id: exam-knowledge-point
    attributes:
      label: 关联考点
      description: 该决策关联的软考知识领域
      options:
        - 架构风格与模式
        - 质量属性与 ATAM 评估
        - 分布式系统设计
        - 安全架构设计
        - 云原生与容器化
        - 数据架构与存储
        - 微服务与 API 设计
    validations:
      required: true

  - type: textarea
    id: consequences
    attributes:
      label: 后果与影响
      description: 实施该决策后的已知影响
      placeholder: |
        **积极影响：**
        - 

        **消极影响：**
        - 

        **需要进一步研究：**
        - 
    validations:
      required: false
