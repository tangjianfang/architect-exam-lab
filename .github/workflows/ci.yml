name: CI 持续集成

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

# 考点：CI/CD 流水线设计
# 软考知识点：DevOps、持续集成、质量保证

jobs:
  # ─── Job 0: 环境前置检查 ───────────────────────────────────────────────
  preflight:
    name: CI 前置条件检查
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 检查 CI 所需根目录文件
        id: check
        run: |
          required_files=("package.json" "pnpm-workspace.yaml" "pnpm-lock.yaml")
          missing_count=0
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "::warning file=$file::缺少必需文件: $file"
              missing_count=$((missing_count + 1))
            fi
          done

          if [ "$missing_count" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

  # ─── Job 1: 代码质量检查 ───────────────────────────────────────────────
  lint:
    name: 代码质量检查（Lint + TypeCheck）
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.ready == 'true'
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: ESLint 代码风格检查
        run: pnpm lint

      - name: TypeScript 类型检查
        run: pnpm typecheck

  # ─── Job 2: 单元测试 + 覆盖率 ──────────────────────────────────────────
  test:
    name: 单元测试 + 覆盖率检查
    runs-on: ubuntu-latest
    needs: [preflight, lint]
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 运行单元测试并生成覆盖率报告
        run: pnpm test:coverage

      - name: 检查覆盖率阈值（≥ 80%）
        run: |
          echo "验证覆盖率是否达到 80% 阈值..."
          # Vitest 配置中已设置 thresholds，此步骤确保结果可见

      - name: 上传覆盖率报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─── Job 3: 架构边界检查 ───────────────────────────────────────────────
  architecture-check:
    name: 架构边界检查（分层约束验证）
    runs-on: ubuntu-latest
    needs: [preflight, lint]
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 检查架构检查脚本是否存在
        run: test -f tests/architecture-check.sh

      - name: 赋予脚本执行权限
        run: chmod +x tests/architecture-check.sh

      - name: 执行架构边界检查
        run: bash tests/architecture-check.sh

  # ─── Job 4: 构建检查 ───────────────────────────────────────────────────
  build:
    name: 构建检查
    runs-on: ubuntu-latest
    needs: [preflight, test, architecture-check]
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 构建所有包
        run: pnpm build

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            packages/*/dist/
          retention-days: 3

  # ─── Job 5: 前置条件未满足提示 ──────────────────────────────────────────
  ci-not-ready:
    name: CI 跳过提示
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.ready != 'true'
    steps:
      - name: 输出提示信息
        run: |
          echo "当前仓库未满足 CI 前置文件检查，已跳过 pnpm 相关校验，请查看「CI 前置条件检查」作业的 warning 明细。"
