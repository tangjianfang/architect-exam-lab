name: CI 持续集成

on:
  push:
    branches: [main, develop]
    paths:
      - 'site/**'
      - '.github/workflows/ci.yml'
      - 'README.md'
  pull_request:
    branches: [main, develop]
    paths:
      - 'site/**'
      - '.github/workflows/ci.yml'
      - 'README.md'

# 考点：CI/CD 流水线设计
# 软考知识点：DevOps、持续集成、质量保证

jobs:
  static-check:
    name: 静态页面校验
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 检查站点入口文件
        run: test -f site/index.html

      - name: 检查基础 HTML 结构
        run: |
          grep -q '<!doctype html>' site/index.html
          grep -q '<title>' site/index.html
          grep -q '</html>' site/index.html
