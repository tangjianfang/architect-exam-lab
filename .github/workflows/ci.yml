name: CI 持续集成

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

# 考点：CI/CD 流水线设计
# 软考知识点：DevOps、持续集成、质量保证

jobs:
  # ─── Job 1: 仓库基础完整性检查 ──────────────────────────────────────────
  repository-check:
    name: 仓库基础完整性检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 检查核心目录与文件
        run: |
          test -d site
          test -f site/index.html
          test -d docs
          test -d packages
          test -f README.md
